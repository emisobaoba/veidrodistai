<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" role="img" aria-labelledby="title desc">
  <title id="title">LED veidrodžio gaminio scena</title>
  <desc id="desc">Modernus šviečiantis veidrodis virš akmens stalviršio su šiltu apšvietimu ir gamybos detale.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.58" stop-color="#dde7e0"/>
      <stop offset="1" stop-color="#b4c8bd"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7f8"/>
      <stop offset="0.48" stop-color="#cbd8dc"/>
      <stop offset="1" stop-color="#8aa2a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="53%">
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.88" stop-color="#f7d890" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#f0c36b" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1100" height="900" rx="42" fill="url(#wall)"/>
  <rect x="56" y="64" width="988" height="604" rx="36" fill="#ffffff" opacity="0.42"/>
  <circle cx="552" cy="326" r="260" fill="#f4c96f" opacity="0.36" filter="url(#soft)"/>
  <circle cx="552" cy="326" r="255" fill="url(#glow)"/>
  <circle cx="552" cy="326" r="208" fill="none" stroke="#f4d58c" stroke-width="18" opacity="0.88"/>
  <circle cx="552" cy="326" r="188" fill="url(#glass)" stroke="#f8fbfa" stroke-width="10"/>
  <path d="M420 182c76 28 198 45 330 20" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity="0.42"/>
  <path d="M436 446c90 42 183 47 287 9" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.26"/>
  <rect x="166" y="645" width="766" height="68" rx="18" fill="#59636a"/>
  <rect x="123" y="708" width="856" height="96" rx="16" fill="#d8d0c1"/>
  <path d="M123 738h856" stroke="#b7ab98" stroke-width="4" opacity="0.5"/>
